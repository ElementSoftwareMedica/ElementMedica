# =============================================================================
# Nginx — updates.elementmedica.com
# Serves static files for electron-updater (generic provider)
#
# Deploy:
#   1. Copy this file to /etc/nginx/conf.d/updates-elementmedica.conf
#   2. Add DNS A record: updates.elementmedica.com → 178.104.44.177
#   3. Obtain SSL cert:
#        sudo certbot --nginx -d updates.elementmedica.com
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. Upload files: ./scripts/deploy-desktop-updates.sh
#
# Tested with:
#   curl https://updates.elementmedica.com/desktop/latest-mac.yml
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name updates.elementmedica.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://updates.elementmedica.com$request_uri;
    }
}

# HTTPS — static update file server
server {
    listen 443 ssl http2;
    server_name updates.elementmedica.com;

    # SSL certs — will be set by certbot
    # ssl_certificate /etc/letsencrypt/live/updates.elementmedica.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/updates.elementmedica.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Access-Control-Allow-Origin "*" always;

    # Root: directory where deploy-desktop-updates.sh uploads files
    root /var/www/elementmedica/desktop-updates;

    # Disable directory listing (security)
    autoindex off;

    # Serve update manifest and binaries
    location /desktop/ {
        alias /var/www/elementmedica/desktop-updates/;

        # Allow electron-updater to fetch files
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # CORS for electron-updater requests
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

        # Optimise large binary downloads
        sendfile on;
        tcp_nopush on;

        # MIME types for electron-updater files
        types {
            application/octet-stream   dmg exe AppImage blockmap;
            application/zip            zip;
            text/yaml                  yml yaml;
        }

        try_files $uri =404;
    }

    # Health check
    location = /health {
        return 200 'updates-server-ok\n';
        add_header Content-Type text/plain;
    }

    # Block everything else
    location / {
        return 404;
    }

    access_log /var/log/nginx/updates-elementmedica.access.log;
    error_log  /var/log/nginx/updates-elementmedica.error.log;
}
