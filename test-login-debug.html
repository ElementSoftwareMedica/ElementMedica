<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #0d9488;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

        button:hover {
            background-color: #0f766e;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .success {
            background-color: #d1fae5;
            border: 1px solid #10b981;
        }

        .error {
            background-color: #fee2e2;
            border: 1px solid #ef4444;
        }

        .info {
            background-color: #dbeafe;
            border: 1px solid #3b82f6;
        }

        h2 {
            color: #0d9488;
        }

        .buttons {
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <h1>🔐 Login Debug Test</h1>
    <p>Test login endpoint directly to diagnose 401 errors</p>

    <div class="form-group">
        <label for="endpoint">Endpoint URL:</label>
        <input type="text" id="endpoint" value="/api/v1/auth/login">
    </div>

    <div class="form-group">
        <label for="email">Email/Username:</label>
        <input type="text" id="email" value="admin@example.com">
    </div>

    <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" value="Admin123!">
    </div>

    <div class="buttons">
        <button onclick="testWithFetch()">Test with Fetch API</button>
        <button onclick="testWithXHR()">Test with XMLHttpRequest</button>
        <button onclick="clearStorage()">Clear LocalStorage</button>
        <button onclick="clearCookies()">Show/Clear Cookies</button>
    </div>

    <div id="result" class="result info">Results will appear here...</div>

    <script>
        function log(message, data = null) {
            const resultDiv = document.getElementById('result');
            const timestamp = new Date().toISOString();
            let text = `[${timestamp}] ${message}`;
            if (data) {
                text += '\n' + JSON.stringify(data, null, 2);
            }
            resultDiv.textContent = text;
            console.log(message, data);
        }

        function setResultClass(success) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result ' + (success ? 'success' : 'error');
        }

        async function testWithFetch() {
            const endpoint = document.getElementById('endpoint').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            log('🚀 Starting Fetch API test...');
            log(`Endpoint: ${endpoint}`);
            log(`Email: ${email}`);
            log(`Current cookies: ${document.cookie || 'none'}`);
            log(`LocalStorage authToken: ${localStorage.getItem('authToken') || 'none'}`);

            try {
                const requestBody = {
                    identifier: email,
                    password: password
                };

                log('📤 Request body:', requestBody);

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Frontend-Id': 'element-medica'
                    },
                    credentials: 'include', // Important for cookies
                    body: JSON.stringify(requestBody)
                });

                log(`📥 Response status: ${response.status} ${response.statusText}`);
                log(`📥 Response headers:`, Object.fromEntries(response.headers.entries()));

                const data = await response.json();

                if (response.ok) {
                    setResultClass(true);
                    log('✅ LOGIN SUCCESS!', data);
                } else {
                    setResultClass(false);
                    log('❌ LOGIN FAILED!', data);
                }
            } catch (error) {
                setResultClass(false);
                log('❌ FETCH ERROR:', {
                    message: error.message,
                    stack: error.stack
                });
            }
        }

        function testWithXHR() {
            const endpoint = document.getElementById('endpoint').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            log('🚀 Starting XMLHttpRequest test...');

            const xhr = new XMLHttpRequest();
            xhr.open('POST', endpoint, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('X-Frontend-Id', 'element-medica');
            xhr.withCredentials = true;

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    log(`📥 XHR Response status: ${xhr.status} ${xhr.statusText}`);
                    log(`📥 XHR Response headers: ${xhr.getAllResponseHeaders()}`);

                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300) {
                            setResultClass(true);
                            log('✅ XHR LOGIN SUCCESS!', data);
                        } else {
                            setResultClass(false);
                            log('❌ XHR LOGIN FAILED!', data);
                        }
                    } catch (e) {
                        setResultClass(false);
                        log('❌ XHR PARSE ERROR:', {
                            response: xhr.responseText,
                            error: e.message
                        });
                    }
                }
            };

            xhr.onerror = function () {
                setResultClass(false);
                log('❌ XHR NETWORK ERROR');
            };

            const body = JSON.stringify({
                identifier: email,
                password: password
            });

            log('📤 XHR Request body:', body);
            xhr.send(body);
        }

        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            setResultClass(true);
            log('🧹 LocalStorage and SessionStorage cleared!');
        }

        function clearCookies() {
            const cookies = document.cookie.split(';');
            let info = `Current cookies (${cookies.length}):\n`;

            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                info += `  - ${cookie}\n`;
            }

            if (confirm('Clear all cookies? (This will log you out)')) {
                cookies.forEach(cookie => {
                    const name = cookie.split('=')[0].trim();
                    document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                });
                info += '\n✅ All cookies cleared!';
                setResultClass(true);
            }

            log(info);
        }
    </script>
</body>

</html>
