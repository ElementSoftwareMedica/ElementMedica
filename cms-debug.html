<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Debug - Medicina del Lavoro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui; padding: 20px; }
    .debug-box { border: 2px solid #333; padding: 20px; margin: 20px 0; border-radius: 8px; }
    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; border-radius: 4px; }
    .success { color: #059669; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>🔍 CMS Debug Tool - Medicina del Lavoro</h1>
  
  <div class="debug-box">
    <h2>API Response</h2>
    <button onclick="fetchContent()" style="background: #0891b2; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none;">
      Fetch Content from API
    </button>
    <div id="api-result" style="margin-top: 20px;"></div>
  </div>

  <div class="debug-box">
    <h2>Rendered HTML Preview</h2>
    <div id="html-preview" style="border: 1px solid #ccc; padding: 20px; min-height: 200px;"></div>
  </div>

  <div class="debug-box">
    <h2>CSS Classes Found</h2>
    <div id="css-classes"></div>
  </div>

  <script>
    async function fetchContent() {
      const resultDiv = document.getElementById('api-result');
      const previewDiv = document.getElementById('html-preview');
      const classesDiv = document.getElementById('css-classes');
      
      try {
        resultDiv.innerHTML = '<p>Loading...</p>';
        
        const response = await fetch('http://localhost:4001/api/v1/cms/pages/slug/medicina-del-lavoro');
        const data = await response.json();
        
        if (data.success) {
          const content = data.data.content;
          const contentType = typeof content;
          
          resultDiv.innerHTML = `
            <p class="success">✅ API call successful</p>
            <p><strong>Slug:</strong> ${data.data.slug}</p>
            <p><strong>Title:</strong> ${data.data.title}</p>
            <p><strong>Updated:</strong> ${data.data.updatedAt}</p>
            <p><strong>Content Type:</strong> ${contentType}</p>
            <p><strong>Content Length:</strong> ${content.length} chars</p>
          `;
          
          // Render the HTML
          if (contentType === 'string') {
            previewDiv.innerHTML = content;
            
            // Find all CSS classes
            const classes = new Set();
            const classRegex = /class="([^"]*)"/g;
            let match;
            while ((match = classRegex.exec(content)) !== null) {
              match[1].split(' ').forEach(cls => {
                if (cls.trim()) classes.add(cls.trim());
              });
            }
            
            const gradientClasses = Array.from(classes).filter(c => 
              c.includes('bg-gradient') || 
              c.includes('from-') || 
              c.includes('via-') || 
              c.includes('to-') ||
              c.includes('text-white') ||
              c.includes('text-cyan') ||
              c.includes('text-teal')
            );
            
            classesDiv.innerHTML = `
              <p><strong>Total unique classes:</strong> ${classes.size}</p>
              <p><strong>Gradient/Color classes:</strong></p>
              <pre>${gradientClasses.join('\n')}</pre>
            `;
          } else {
            previewDiv.innerHTML = '<p class="error">❌ Content is not a string!</p>';
          }
        } else {
          resultDiv.innerHTML = `<p class="error">❌ API error: ${data.error}</p>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
      }
    }
    
    // Auto-fetch on load
    window.onload = fetchContent;
  </script>
</body>
</html>
