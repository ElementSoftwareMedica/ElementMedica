# =============================================================================
# ElementMedica Multi-Domain Nginx Configuration
# Production PM2 Deployment (NOT Docker)
# Server: 128.140.15.15 (Hetzner Cloud)
# API: 127.0.0.1:4001 | Documents: 127.0.0.1:4002
# =============================================================================

# -- Log format: compact for API, skip static/health noise ---------------------
log_format api_compact '$remote_addr - $request_time "$request" $status $body_bytes_sent "$http_referer"';

# -- Shared upstream definitions -----------------------------------------------
upstream api_backend {
    server 127.0.0.1:4001;
}

upstream docs_backend {
    server 127.0.0.1:4002;
}

# ==============================================================================
# ELEMENTFORMAZIONE.COM (Legacy → redirect permanente a www.elementsicurezza.com)
# Vecchio dominio formazione → ora rimanda a Element Sicurezza (formazione/sicurezza)
# SEMANTICAMENTE CORRETTO: elementformazione.com ↔ formazione+sicurezza, non clinica
# ==============================================================================

# HTTP redirect
server {
    listen 80;
    server_name elementformazione.com www.elementformazione.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.elementsicurezza.com$request_uri;
    }
}

# HTTPS redirect (both www and non-www)
server {
    listen 443 ssl http2;
    server_name elementformazione.com www.elementformazione.com;

    ssl_certificate /etc/ssl/elementmedica/origin.crt;
    ssl_certificate_key /etc/ssl/elementmedica/origin.key;

    return 301 https://www.elementsicurezza.com$request_uri;
}

# ==============================================================================
# ELEMENTSICUREZZA.COM (CRM/Backoffice - Primary)
# ==============================================================================

# Main HTTPS - elementsicurezza.com (CRM/Backoffice)
server {
    server_name elementsicurezza.com www.elementsicurezza.com;

    # Buffered access log: only API+app requests, static/health suppressed below
    access_log /var/log/nginx/elementsicurezza.access.log api_compact buffer=32k flush=5m;

    root /var/www/elementmedica/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Dedicated handling for Bridge installer download to reduce QUIC/proxy streaming issues.
    location = /api/v1/clinica/strumenti-bridge/download-installer {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frontend-Id element-sicurezza;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        gzip off;
        add_header Alt-Svc "clear" always;
        add_header Cache-Control "no-store" always;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frontend-Id element-sicurezza;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    location /docs/ {
        proxy_pass http://docs_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frontend-Id element-sicurezza;
        client_max_body_size 50M;
    }

    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://api_backend/health;
        # Health checks are very frequent — suppress logs to reduce disk noise
        access_log off;
    }

    location ^~ /uploads/ {
        alias /var/www/elementmedica/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Binary uploads — suppress access logs for these static served files
        access_log off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        # Static assets served thousands of times/day — no useful signal in logs
        access_log off;
    }

    # SEO files - serve directly with correct Content-Type and no cache
    location = /robots.txt {
        add_header Content-Type text/plain;
        expires 1d;
        access_log off;
    }
    location = /sitemap.xml {
        add_header Content-Type application/xml;
        expires 1d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/ssl/elementmedica/origin.crt; # managed by Certbot
    ssl_certificate_key /etc/ssl/elementmedica/origin.key; # managed by Certbot


}

